<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezsencia — Próximamente</title>
    <meta name="description" content="Ezsencia. Un círculo privado construido alrededor de la trufa negra de Alcotas.">
    <meta property="og:title"       content="Ezsencia — Próximamente">
    <meta property="og:description" content="Alcotas, Teruel · Edición Fundadores 2026">
    <meta property="og:image"       content="https://raw.githubusercontent.com/aalexxgc/ezsencia-web-/main/assets/og-image.jpg">
    <link rel="icon" href="https://raw.githubusercontent.com/aalexxgc/ezsencia-web-/main/assets/favicon.ico" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=EB+Garamond:ital,wght@0,300;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --fondo:  #f5f0e8;
            --oscuro: #0a0907;
            --dorado: #9a7d4a;
        }

        html, body { height: 100%; }

        body {
            background:     var(--oscuro);
            color:          var(--fondo);
            font-family:    'Lato', sans-serif;
            display:        flex;
            flex-direction: column;
            min-height:     100vh;
            overflow-x:     hidden;
        }

        /* ── Vídeo de fondo ── */
        .bg-video {
            position: fixed;
            inset:    0;
            z-index:  0;
        }

        .bg-video iframe {
            position:   absolute;
            top:        50%;
            left:       50%;
            transform:  translate(-50%, -50%);
            width:      177.78vh;
            height:     56.25vw;
            min-width:  100%;
            min-height: 100%;
            border:     0;
            pointer-events: none;
        }

        .bg-overlay {
            position:   fixed;
            inset:      0;
            z-index:    1;
            background: linear-gradient(
                160deg,
                rgba(10,9,7,0.78) 0%,
                rgba(10,9,7,0.55) 60%,
                rgba(10,9,7,0.72) 100%
            );
        }

        /* ── Layout ── */
        .page {
            position:        relative;
            z-index:         2;
            display:         flex;
            flex-direction:  column;
            justify-content: space-between;
            min-height:      100vh;
            padding:         3rem 4rem;
        }

        /* ── Header ── */
        .prx-header {
            display:         flex;
            justify-content: space-between;
            align-items:     center;
        }

        .prx-logo {
            font-family:     'Lato', sans-serif;
            font-weight:     300;
            font-size:       0.75rem;
            letter-spacing:  0.38em;
            text-transform:  uppercase;
            color:           var(--fondo);
            text-decoration: none;
        }

        .prx-badge {
            font-family:    'Lato', sans-serif;
            font-size:      0.55rem;
            font-weight:    300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color:          var(--dorado);
            opacity:        0.85;
        }

        /* ── Centro ── */
        .prx-center {
            display:        flex;
            flex-direction: column;
            flex:           1;
            justify-content: center;
            padding:        4rem 0 2rem;
        }

        .prx-label {
            font-family:    'Lato', sans-serif;
            font-size:      0.55rem;
            font-weight:    300;
            letter-spacing: 0.44em;
            text-transform: uppercase;
            color:          var(--dorado);
            margin-bottom:  2rem;
            opacity:        0;
            animation:      fadeUp 1.2s 0.3s ease forwards;
        }

        .prx-title {
            font-family:    'Playfair Display', serif;
            font-size:      clamp(3.5rem, 9vw, 8.5rem);
            font-weight:    400;
            font-style:     italic;
            line-height:    0.95;
            letter-spacing: -0.02em;
            color:          var(--fondo);
            margin-bottom:  3rem;
            opacity:        0;
            animation:      fadeUp 1.2s 0.6s ease forwards;
        }

        .prx-sep {
            width:         3rem;
            height:        1px;
            background:    var(--dorado);
            margin-bottom: 2.4rem;
            opacity:       0;
            animation:     fadeUp 1.2s 0.9s ease forwards;
        }

        .prx-sub {
            font-family:    'EB Garamond', serif;
            font-size:      clamp(1rem, 1.8vw, 1.3rem);
            font-style:     italic;
            font-weight:    300;
            color:          rgba(245,240,232,0.65);
            line-height:    1.8;
            max-width:      420px;
            opacity:        0;
            animation:      fadeUp 1.2s 1.1s ease forwards;
        }

        /* ── Footer ── */
        .prx-footer {
            display:         flex;
            justify-content: space-between;
            align-items:     flex-end;
            padding-top:     2rem;
            border-top:      1px solid rgba(245,240,232,0.1);
            opacity:         0;
            animation:       fadeUp 1.2s 1.4s ease forwards;
        }

        .prx-footer-left {
            font-size:      0.6rem;
            font-weight:    300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color:          rgba(245,240,232,0.3);
        }

        .prx-contact {
            font-family:     'EB Garamond', serif;
            font-size:       0.9rem;
            font-style:      italic;
            color:           rgba(245,240,232,0.5);
            text-decoration: none;
            transition:      color 0.3s ease;
        }

        .prx-contact:hover { color: var(--fondo); }

        /* ── Animación ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Móvil ── */
        @media (max-width: 640px) {
            .page      { padding: 2rem 1.8rem; }
            .prx-badge { display: none; }
            .prx-footer {
                flex-direction: column;
                align-items:    flex-start;
                gap:            1rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-video">
        <iframe src="https://www.youtube.com/embed/ylK3nQOcVkA?autoplay=1&mute=1&loop=1&playlist=ylK3nQOcVkA&controls=0&rel=0&modestbranding=1&playsinline=1"
                frameborder="0"
                allow="autoplay; fullscreen"
                allowfullscreen
                title="Ezsencia"></iframe>
    </div>
    <div class="bg-overlay"></div>

    <div class="page">

        <header class="prx-header">
            <span class="prx-logo">Ezsencia</span>
            <span class="prx-badge">Alcotas, Teruel &nbsp;&middot;&nbsp; Edici&oacute;n Fundadores 2026</span>
        </header>

        <div class="prx-center">
            <p class="prx-label">Pr&oacute;ximamente</p>
            <h1 class="prx-title">
                Algo<br>especial<br>se prepara.
            </h1>
            <div class="prx-sep"></div>
            <p class="prx-sub">
                Un c&iacute;rculo privado construido<br>
                alrededor de la trufa negra de Alcotas.
            </p>
        </div>

        <footer class="prx-footer">
            <span class="prx-footer-left">&copy; 2026 Ezsencia</span>
            <a href="mailto:hola@ezsencia.com" class="prx-contact">hola@ezsencia.com</a>
        </footer>

    </div>

</body>
</html>
